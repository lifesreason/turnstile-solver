name: Build Docker Image

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Docker platforms (comma-separated)"
        required: false
        default: "linux/amd64"

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: ${{ contains(github.event.inputs.platforms || 'linux/amd64', 'arm') }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - name: Resolve platforms
        id: plats
        run: |
          P="${{ github.event.inputs.platforms }}"
          if [ -z "$P" ]; then P="linux/amd64"; fi
          echo "platforms=$P" >> "$GITHUB_OUTPUT"
          echo "Building platforms: $P"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ steps.plats.outputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
