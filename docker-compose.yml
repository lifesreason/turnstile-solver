# NAS / 服务器独立部署 Turnstile Solver
# 镜像由 GitHub Actions 推送到 GHCR（推送 master 后构建）
#
# 使用前把 image 换成你的仓库路径，例如：
#   ghcr.io/jeck5001/turnstile-solver:latest

services:
  turnstile-solver:
    image: ghcr.io/jeck5001/turnstile-solver:latest
    container_name: turnstile-solver
    restart: unless-stopped
    ports:
      - "5072:5072"
    environment:
      TURNSTILE_HOST: "0.0.0.0"
      TURNSTILE_PORT: "5072"
      TURNSTILE_THREAD: "${TURNSTILE_THREAD:-1}"
      TURNSTILE_BROWSER_INSTANCES: "${TURNSTILE_BROWSER_INSTANCES:-1}"
      TURNSTILE_BROWSER_TYPE: "${TURNSTILE_BROWSER_TYPE:-camoufox}"
      TURNSTILE_DEBUG: "${TURNSTILE_DEBUG:-0}"
      TURNSTILE_LAZY: "${TURNSTILE_LAZY:-1}"
      TURNSTILE_KEEP_BROWSER_ALIVE: "${TURNSTILE_KEEP_BROWSER_ALIVE:-0}"
      TURNSTILE_UNBLOCK_RENDERING: "${TURNSTILE_UNBLOCK_RENDERING:-0}"
      TURNSTILE_WORKER_MODE: "${TURNSTILE_WORKER_MODE:-process}"
      TURNSTILE_WORKER_TIMEOUT: "${TURNSTILE_WORKER_TIMEOUT:-120}"
      TURNSTILE_IDLE_SEC: "${TURNSTILE_IDLE_SEC:-60}"
      # 生产建议设置鉴权：业务 createTask 时 clientKey 填同一值
      # API_KEY: "change-me"
    # 单浏览器默认 512MB 共享内存即可；高并发或浏览器崩溃时再按需调大
    shm_size: "${TURNSTILE_SHM_SIZE:-512mb}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5072/health', timeout=5).read()\""]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
